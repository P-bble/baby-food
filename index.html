<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝宝辅食记录</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #fef5f8;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #ff69b4;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 16px;
        }
        input, select, textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            background: #fafafa;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn-pink {
            background: #ff69b4;
            color: white;
        }
        .btn-pink:hover {
            background: #ff1493;
        }
        .food-list {
            margin-top: 30px;
        }
        .food-item {
            background: #fff9fc;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            border-left: 4px solid #ff69b4;
        }
        .food-time {
            color: #999;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .food-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        .food-desc {
            color: #666;
            line-height: 1.6;
        }
        .empty-tip {
            text-align: center;
            color: #999;
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍼 宝宝辅食记录</h1>

        <!-- 新增辅食表单（含时间） -->
        <div class="form-group">
            <label for="foodTime">辅食时间</label>
            <input type="datetime-local" id="foodTime" required>
        </div>
        <div class="form-group">
            <label for="foodName">辅食名称</label>
            <input type="text" id="foodName" placeholder="例如：南瓜泥、高铁米粉" required>
        </div>
        <div class="form-group">
            <label for="foodCategory">辅食分类</label>
            <select id="foodCategory">
                <option value="全部">全部</option>
                <option value="蔬菜类">蔬菜类</option>
                <option value="水果类">水果类</option>
                <option value="主食类">主食类</option>
                <option value="肉类">肉类</option>
                <option value="蛋类">蛋类</option>
            </select>
        </div>
        <div class="form-group">
            <label for="foodDesc">辅食详情/做法</label>
            <textarea id="foodDesc" placeholder="记录食材、做法、宝宝食用情况等"></textarea>
        </div>
        <button class="btn btn-pink" id="addBtn">➕ 添加辅食记录</button>

        <!-- 辅食记录列表 -->
        <div class="food-list" id="foodList">
            <div class="empty-tip">暂无辅食记录，快来添加第一条吧~</div>
        </div>
    </div>

    <script src="config.js"></script>
</body>
</html>
