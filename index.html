<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>宝宝辅食记录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow-x:hidden;background:#fff5f7}
.page{display:none;padding:16px;width:100%;max-width:480px;margin:0 auto;min-height:100vh}
.page.active{display:block}
.title{font-size:22px;font-weight:bold;text-align:center;margin:16px 0;color:#ff69b4}
.btn{background:#ff69b4;color:white;border:none;border-radius:14px;padding:14px;width:100%;margin-top:10px;font-weight:bold;font-size:16px}
.grayBtn{background:#ccc;color:white}
.avatar{width:70px;height:70px;border-radius:50%;object-fit:cover;margin:10px auto;display:block;border:3px solid #ff69b4}
.avatarInput{display:none}
.avatarLabel{text-align:center;color:#ff69b4;font-size:14px;display:block;margin:5px 0;cursor:pointer}
.babyInfoBar{display:flex;align-items:center;gap:10px;padding:10px;background:white;border-radius:16px;margin-bottom:16px}
.babyInfoBar img{width:50px;height:50px;border-radius:50%}
.babyInfoBar .info{flex:1}
.babyInfoBar .name{font-size:16px;font-weight:bold}
.babyInfoBar .id{font-size:12px;color:#888}
.shareBtn{background:#00b894;color:white;border:none;border-radius:12px;padding:10px 14px;margin-top:10px;width:100%}
.nav{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:20px;position:sticky;bottom:0;background:#fff5f7;padding:8px 0}
.nav button{background:white;border:1px solid #ff69b4;color:#ff69b4;border-radius:12px;padding:10px 4px;font-size:12px}
.nav button.active{background:#ff69b4;color:white}
.form{background:white;border-radius:16px;padding:18px;margin-top:16px}
.form input,.form select,.form textarea{width:100%;padding:14px;margin-bottom:12px;border:1px solid #eee;border-radius:12px;font-size:16px}
.feedback{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.feedback button{padding:12px;border-radius:12px;border:1px solid #eee;background:white;font-size:20px}
.feedback button.active{background:#ff69b4;color:white}
#badNote{display:none;margin-bottom:12px}
.suggest{background:white;border:1px solid #eee;border-radius:12px;overflow:hidden;margin-top:-12px;margin-bottom:12px;max-height:150px;overflow-y:auto}
.suggest div{padding:12px 14px;cursor:pointer}
.suggest div:hover{background:#fef5f8}
.record-table{width:100%;background:white;border-radius:16px;overflow:hidden;margin-top:16px}
.record-table table{width:100%;border-collapse:collapse}
.record-table th,.record-table td{padding:10px 6px;text-align:left;border-bottom:1px solid #f0f0f0;font-size:13px;word-wrap:break-word}
.record-table th{background:#fff5f7;color:#ff69b4}
.record-table td button{padding:4px 6px;font-size:12px;background:#ff69b4;color:white;border:none;border-radius:6px;margin-right:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:16px}
.food{background:white;border-radius:16px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.food h3{margin:8px 0;font-size:15px}
.food span{font-size:12px}

/* 日期筛选 */
.filter-bar{display:flex;gap:10px;margin-bottom:16px;background:white;padding:12px;border-radius:16px}
.filter-bar input{flex:1;padding:10px;border:1px solid #eee;border-radius:12px}
.filter-bar button{padding:10px 14px;background:#ff69b4;color:white;border:none;border-radius:12px}

/* 喂养分析图表（无坐标 + 堆叠 + 辅食名 + 总顿数） */
.chart-box{background:white;border-radius:16px;padding:20px;margin-bottom:16px;overflow-x:auto}
.chart-inner{display:flex;align-items:flex-end;gap:14px;min-width:600px;height:280px}
.day-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end}
.stack-block{width:100%;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:bold;writing-mode:vertical-rl}
.day-total{font-size:16px;font-weight:bold;margin-bottom:6px;color:#333}
.day-date{font-size:12px;color:#888;margin-top:8px}

.avg-tip{text-align:center;color:#ff69b4;font-weight:bold;margin:8px 0;font-size:14px}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:999}
.popup-box{background:white;padding:24px;border-radius:20px;width:90%;max-width:320px}
.flexRow{display:flex;gap:10px;margin-top:12px}
.flexRow button{flex:1}
</style>
</head>
<body>

<!-- 宝宝信息页 -->
<div class="page active" id="pageBaby">
  <div class="title">👶宝宝信息</div>
  <img id="avatarPreview" class="avatar" src="https://picsum.photos/200/200">
  <label class="avatarLabel" for="avatarInput">更换头像</label>
  <input type="file" id="avatarInput" class="avatarInput" accept="image/*">
  
  <div class="form">
    <input type="text" id="babyId" placeholder="请输入宝宝ID（用于家人同步）">
    <input type="date" id="babyBirth" placeholder="请输入宝宝生日">
    <div style="color:#ff69b4;margin:10px 0;text-align:center" id="babyMonth"></div>
    <button class="btn" onclick="saveBaby()">保存并进入</button>
  </div>
  <button class="shareBtn" onclick="shareData()">📤分享给家人</button>
  <div class="nav">
    <button class="active" onclick="go('baby')">宝宝信息</button>
    <button onclick="go('record')">辅食记录</button>
    <button onclick="go('main')">辅食图鉴</button>
    <button onclick="go('analysis')">喂养分析</button>
  </div>
</div>

<!-- 辅食记录 -->
<div class="page" id="pageRecord">
  <div class="babyInfoBar">
    <img id="barAvatar1">
    <div class="info">
      <div class="name" id="barMonth1"></div>
      <div class="id" id="barId1"></div>
    </div>
  </div>
  <div class="title">📋辅食记录</div>
  <div class="form">
    <input type="text" id="age" readonly placeholder="自动获取宝宝月龄">
    <input type="datetime-local" id="eatTime" step="1">
    <input type="text" id="food" placeholder="输入辅食名称">
    <input type="number" id="gram" placeholder="喂养克数（选填）">
    <select id="type">
      <option>主食类</option><option>蔬菜类</option><option>水果类</option><option>肉类</option><option>蛋类</option>
    </select>
    <div class="feedback">
      <button onclick="setFeed(1)">😊</button>
      <button onclick="setFeed(0)">😢</button>
    </div>
    <textarea id="badNote" placeholder="备注：过敏、起疹、异常"></textarea>
    <button class="btn" onclick="addRecord()">添加记录</button>
  </div>
  <div class="record-table">
    <table>
      <thead><tr><th>月龄</th><th>时间</th><th>辅食</th><th>克数</th><th>反应</th><th>备注</th><th>操作</th></tr></thead>
      <tbody id="recordList"></tbody>
    </table>
  </div>
  <button class="shareBtn" onclick="shareData()">📤分享给家人</button>
  <div class="nav">
    <button onclick="go('baby')">宝宝信息</button>
    <button class="active" onclick="go('record')">辅食记录</button>
    <button onclick="go('main')">辅食图鉴</button>
    <button onclick="go('analysis')">喂养分析</button>
  </div>
</div>

<!-- 图鉴 -->
<div class="page" id="pageMain">
  <div class="babyInfoBar">
    <img id="barAvatar2">
    <div class="info">
      <div class="name" id="barMonth2"></div>
      <div class="id" id="barId2"></div>
    </div>
  </div>
  <div class="title">🍼辅食图鉴</div>
  <div class="grid" id="foodGrid"></div>
  <button class="shareBtn" onclick="shareData()">📤分享给家人</button>
  <div class="nav">
    <button onclick="go('baby')">宝宝信息</button>
    <button onclick="go('record')">辅食记录</button>
    <button class="active" onclick="go('main')">辅食图鉴</button>
    <button onclick="go('analysis')">喂养分析</button>
  </div>
</div>

<!-- 喂养分析（日期范围筛选 + 无坐标堆叠图） -->
<div class="page" id="pageAnalysis">
  <div class="babyInfoBar">
    <img id="barAvatar3">
    <div class="info">
      <div class="name" id="barMonth3"></div>
      <div class="id" id="barId3"></div>
    </div>
  </div>
  <div class="title">📊喂养分析</div>

  <!-- 日期范围筛选 -->
  <div class="filter-bar">
    <input type="date" id="startDate" placeholder="开始日期">
    <input type="date" id="endDate" placeholder="结束日期">
    <button onclick="renderChart()">筛选</button>
  </div>

  <!-- 堆叠统计图 -->
  <div class="chart-box">
    <div class="chart-inner" id="chartInner"></div>
  </div>

  <div class="avg-tip" id="sumInfo"></div>
  <button class="shareBtn" onclick="shareData()">📤分享给家人</button>
  <div class="nav">
    <button onclick="go('baby')">宝宝信息</button>
    <button onclick="go('record')">辅食记录</button>
    <button onclick="go('main')">辅食图鉴</button>
    <button class="active" onclick="go('analysis')">喂养分析</button>
  </div>
</div>

<!-- 编辑弹窗 -->
<div class="popup" id="editPopup">
  <div class="popup-box">
    <h3>编辑记录</h3>
    <input type="datetime-local" id="editTime"><br>
    <input type="text" id="editFood" placeholder="辅食名称"><br>
    <input type="number" id="editGram" placeholder="克数"><br>
    <div class="feedback">
      <button id="eGood">😊</button><button id="eBad">😢</button>
    </div>
    <textarea id="editNote"></textarea>
    <div class="flexRow">
      <button class="grayBtn" onclick="closeEdit()">取消</button>
      <button class="btn" onclick="saveEdit()">确定</button>
    </div>
  </div>
</div>

<script>
let records = JSON.parse(localStorage.getItem('records')) || [];
let baby = JSON.parse(localStorage.getItem('baby')) || {id:'', birth:'', avatar:'https://picsum.photos/200/200'};
let collection = JSON.parse(localStorage.getItem('foodCollection')) || [];
let currentFeed = null;
let editIndex = -1;

window.onload = () => {
  loadBaby();
  renderRecords();
  renderCollection();
  refreshInfoBar();
  autoJump();
  renderChart();

  document.getElementById('avatarInput').onchange = e => {
    const f = e.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = ev => {
      baby.avatar = ev.target.result;
      localStorage.setItem('baby', JSON.stringify(baby));
      loadBaby();
      refreshInfoBar();
    };
    r.readAsDataURL(f);
  };
};

function autoJump(){
  if(baby.id && baby.birth) go('record');
}

function saveBaby(){
  const id = document.getElementById('babyId').value.trim();
  const birth = document.getElementById('babyBirth').value.trim();
  if(!id || !birth) return alert('请填写完整');
  baby.id = id;
  baby.birth = birth;
  localStorage.setItem('baby', JSON.stringify(baby));
  loadBaby();
  refreshInfoBar();
  go('record');
}

function loadBaby(){
  document.getElementById('avatarPreview').src = baby.avatar;
  document.getElementById('babyId').value = baby.id;
  document.getElementById('babyBirth').value = baby.birth;
  if(!baby.birth) return;
  const b = new Date(baby.birth);
  const now = new Date();
  let m = (now.getFullYear()-b.getFullYear())*12 + now.getMonth() - b.getMonth();
  let d = now.getDate() - b.getDate();
  if(d<0){ m--; d+=new Date(b.getFullYear(),b.getMonth()+1,0).getDate(); }
  const txt = `${m}月龄${d}天`;
  document.getElementById('babyMonth').innerText = txt;
  document.getElementById('age').value = txt;
}

function refreshInfoBar(){
  for(let i=1;i<=3;i++){
    document.getElementById('barAvatar'+i).src = baby.avatar;
    document.getElementById('barId'+i).innerText = 'ID：'+baby.id;
    document.getElementById('barMonth'+i).innerText = document.getElementById('age').value;
  }
}

function go(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
  document.getElementById('page'+p[0].toUpperCase()+p.slice(1)).classList.add('active');
  if(event) event.target.classList.add('active');
  refreshInfoBar();
}

function setFeed(t){
  currentFeed = t;
  document.querySelectorAll('#pageRecord .feedback button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}

function addRecord(){
  const age = document.getElementById('age').value;
  const time = document.getElementById('eatTime').value;
  const food = document.getElementById('food').value;
  const gram = document.getElementById('gram').value || '';
  const type = document.getElementById('type').value;
  const note = document.getElementById('badNote').value;
  if(!age || !time || !food || currentFeed==null) return alert('请填写完整');
  records.push({age,time,food,gram,type,feed:currentFeed,note});
  localStorage.setItem('records', JSON.stringify(records));
  renderRecords();
  renderChart();
  clearForm();
}

function clearForm(){
  document.getElementById('eatTime').value='';
  document.getElementById('food').value='';
  document.getElementById('gram').value='';
  document.getElementById('badNote').value='';
  currentFeed=null;
  document.querySelectorAll('.feedback button').forEach(b=>b.classList.remove('active'));
}

function renderRecords(){
  document.getElementById('recordList').innerHTML = records.map((r,i)=>`
  <tr>
    <td>${r.age}</td>
    <td>${r.time.replace('T',' ')}</td>
    <td>${r.food}</td>
    <td>${r.gram||'-'}</td>
    <td>${r.feed==1?'😊':'😢'}</td>
    <td>${r.note||'-'}</td>
    <td><button onclick="edit(${i})">编辑</button></td>
  </tr>`).join('');
}

function edit(i){
  editIndex=i; const r=records[i];
  document.getElementById('editTime').value=r.time;
  document.getElementById('editFood').value=r.food;
  document.getElementById('editGram').value=r.gram||'';
  document.getElementById('editNote').value=r.note||'';
  document.querySelectorAll('#editPopup .feedback button').forEach(b=>b.classList.remove('active'));
  document.getElementById(r.feed==1?'eGood':'eBad').classList.add('active');
  document.getElementById('editPopup').style.display='flex';
}
function closeEdit(){ document.getElementById('editPopup').style.display='none'; editIndex=-1; }
function saveEdit(){
  if(editIndex<0) return;
  records[editIndex] = {
    ...records[editIndex],
    time:document.getElementById('editTime').value,
    food:document.getElementById('editFood').value,
    gram:document.getElementById('editGram').value,
    note:document.getElementById('editNote').value,
    feed:document.getElementById('eGood').classList.contains('active')?1:0
  };
  localStorage.setItem('records', JSON.stringify(records));
  renderRecords(); renderChart(); closeEdit();
}

function renderCollection(){
  const g=document.getElementById('foodGrid');
  if(!collection.length){ g.innerHTML='<div style="padding:30px;text-align:center">暂无解锁</div>'; return; }
  g.innerHTML=collection.map(i=>`<div class="food"><h3>${i.name}</h3></div>`).join('');
}

// ====================== 喂养分析：日期范围筛选 + 堆叠图 ======================
function renderChart(){
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;
  let list = records;
  if(start && end){
    list = records.filter(r=>r.time.split('T')[0]>=start && r.time.split('T')[0]<=end);
  }
  const dayGroup = {};
  list.forEach(r=>{
    const day = r.time.split('T')[0];
    if(!dayGroup[day]) dayGroup[day]=[];
    dayGroup[day].push(r);
  });
  const days = Object.keys(dayGroup).sort();
  const colors = ['#ff69b4','#74b9ff','#fd79a8','#fdcb6e','#00b894','#a29bfe','#ff7675','#7bed9f'];
  let html = '';
  days.forEach(day=>{
    const items = dayGroup[day];
    const total = items.length;
    let blocks = '';
    items.forEach((it,idx)=>{
      const h = 80;
      blocks+=`<div class="stack-block" style="height:${h}px;background:${colors[idx%colors.length]}">${it.food}</div>`;
    });
    html+=`
    <div class="day-col">
      <div class="day-total">${total}顿</div>
      ${blocks}
      <div class="day-date">${day.slice(5)}</div>
    </div>`;
  });
  document.getElementById('chartInner').innerHTML = html;
  const totalCnt = list.length;
  const good = list.filter(x=>x.feed==1).length;
  const foodCnt = [...new Set(list.map(x=>x.food))].length;
  document.getElementById('sumInfo').innerText = `总记录：${totalCnt}次｜喜欢：${good}次｜已尝试：${foodCnt}种`;
}

function shareData(){
  const data = {baby,records,collection};
  const url = URL.createObjectURL(new Blob([JSON.stringify(data)],{type:'application/json'}));
  prompt('分享链接（复制后家人打开即可同步）：', url);
}
</script>
</body>
</html>
