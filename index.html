<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>宝宝辅食记录</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow-x:hidden;background:#fff5f7}
.page{display:none;padding:16px;width:100%;max-width:480px;margin:0 auto;min-height:100vh}
.page.active{display:block}
.title{font-size:22px;font-weight:bold;text-align:center;margin:16px 0;color:#ff69b4}
.btn{background:#ff69b4;color:white;border:none;border-radius:14px;padding:14px;width:100%;margin-top:10px;font-weight:bold;font-size:16px}
.grayBtn{background:#ccc;color:white}
.avatar{width:70px;height:70px;border-radius:50%;object-fit:cover;margin:10px auto;display:block;border:3px solid #ff69b4}
.avatarInput{display:none}
.avatarLabel{text-align:center;color:#ff69b4;font-size:14px;display:block;margin:5px 0;cursor:pointer}
.babyInfoBar{display:flex;align-items:center;gap:10px;padding:10px;background:white;border-radius:16px;margin-bottom:16px}
.babyInfoBar img{width:50px;height:50px;border-radius:50%}
.babyInfoBar .info{flex:1}
.babyInfoBar .name{font-size:16px;font-weight:bold}
.babyInfoBar .id{font-size:12px;color:#888}
.shareBtn{background:#00b894;color:white;border:none;border-radius:12px;padding:10px 14px;margin-top:10px;width:100%}
.nav{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:20px;position:sticky;bottom:0;background:#fff5f7;padding:8px 0}
.nav button{background:white;border:1px solid #ff69b4;color:#ff69b4;border-radius:12px;padding:10px 4px;font-size:12px}
.nav button.active{background:#ff69b4;color:white}
.form{background:white;border-radius:16px;padding:18px;margin-top:16px}
.form input,.form select,.form textarea{width:100%;padding:14px;margin-bottom:12px;border:1px solid #eee;border-radius:12px;font-size:16px}
.feedback{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.feedback button{padding:12px;border-radius:12px;border:1px solid #eee;background:white;font-size:20px}
.feedback button.active{background:#ff69b4;color:white}
#badNote{display:none;margin-bottom:12px}
.suggest{background:white;border:1px solid #eee;border-radius:12px;overflow:hidden;margin-top:-12px;margin-bottom:12px;max-height:150px;overflow-y:auto}
.suggest div{padding:12px 14px;cursor:pointer}
.suggest div:hover{background:#fef5f8}
.record-table{width:100%;background:white;border-radius:16px;overflow:hidden;margin-top:16px}
.record-table table{width:100%;border-collapse:collapse}
.record-table th,.record-table td{padding:10px 6px;text-align:left;border-bottom:1px solid #f0f0f0;font-size:13px;word-wrap:break-word}
.record-table th{background:#fff5f7;color:#ff69b4}
.record-table td button{padding:4px 6px;font-size:12px;background:#ff69b4;color:white;border:none;border-radius:6px;margin-right:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:16px}
.food{background:white;border-radius:16px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.food h3{margin:8px 0;font-size:15px}
.food span{font-size:12px}
.chart-box{background:white;border-radius:16px;padding:16px;margin-bottom:16px}
.chart-box h4{margin-bottom:10px;font-size:14px;color:#555}
.avg-tip{text-align:center;color:#ff69b4;font-weight:bold;margin:8px 0;font-size:14px}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:999}
.popup-box{background:white;padding:24px;border-radius:20px;width:90%;max-width:320px}
.flexRow{display:flex;gap:10px;margin-top:12px}
.flexRow button{flex:1}
</style>
</head>
<body>

<!-- 0.宝宝信息页（已修复保存）-->
<div class="page active" id="pageBaby">
  <div class="title">👶宝宝信息</div>
  <img id="avatarPreview" class="avatar" src="https://picsum.photos/200/200">
  <label class="avatarLabel" for="avatarInput">更换头像</label>
  <input type="file" id="avatarInput" class="avatarInput" accept="image/*">
  
  <div class="form">
    <input type="text" id="babyId" placeholder="请输入宝宝ID（用于家人同步）">
    <input type="date" id="babyBirth" placeholder="请输入宝宝生日">
    <div style="color:#ff69b4;margin:10px 0;text-align:center" id="babyMonth"></div>
    <button class="btn" onclick="saveBaby()">保存并进入</button>
  </div>

  <button class="shareBtn" onclick="shareData()">📤分享给家人</button>

  <div class="nav">
    <button class="active" onclick="go('baby')">宝宝信息</button>
    <button onclick="go('record')">辅食记录</button>
    <button onclick="go('main')">辅食图鉴</button>
    <button onclick="go('analysis')">喂养分析</button>
  </div>
</div>

<!-- 1.记录页（新增克数） -->
<div class="page" id="pageRecord">
  <div class="babyInfoBar">
    <img id="barAvatar1">
    <div class="info">
      <div class="name" id="barMonth1"></div>
      <div class="id" id="barId1"></div>
    </div>
  </div>
  <div class="title">📋辅食记录</div>
  <div class="form">
    <input type="text" id="age" readonly placeholder="自动获取宝宝月龄">
    <input type="datetime-local" id="eatTime" step="1">
    <input type="text" id="food" placeholder="输入辅食名称" oninput="showSuggest()">
    <div class="suggest" id="suggestBox" style="display:none"></div>
    <input type="number" id="gram" placeholder="本次喂养份量（克，选填）">
    <select id="type">
      <option>主食类</option><option>蔬菜类</option><option>水果类</option><option>肉类</option><option>蛋类</option>
    </select>
    <div class="feedback">
      <button onclick="setFeed(1)">😊</button>
      <button onclick="setFeed(0)">😢</button>
    </div>
    <textarea id="badNote" placeholder="备注：过敏、起疹、大便异常（可选）"></textarea>
    <button class="btn" onclick="addRecord()">添加记录</button>
  </div>
  <div class="record-table">
    <table>
      <thead>
        <tr><th>月龄</th><th>时间</th><th>辅食</th><th>克数</th><th>反应</th><th>备注</th><th>操作</th></tr>
      </thead>
      <tbody id="recordList"></tbody>
    </table>
  </div>

  <button class="shareBtn" onclick="shareData()">📤分享给家人</button>

  <div class="nav">
    <button onclick="go('baby')">宝宝信息</button>
    <button class="active" onclick="go('record')">辅食记录</button>
    <button onclick="go('main')">辅食图鉴</button>
    <button onclick="go('analysis')">喂养分析</button>
  </div>
</div>

<!-- 2.辅食图鉴 -->
<div class="page" id="pageMain">
  <div class="babyInfoBar">
    <img id="barAvatar2">
    <div class="info">
      <div class="name" id="barMonth2"></div>
      <div class="id" id="barId2"></div>
    </div>
  </div>
  <div class="title">🍼辅食图鉴</div>
  <div class="grid" id="foodGrid"></div>

  <button class="shareBtn" onclick="shareData()">📤分享给家人</button>

  <div class="nav">
    <button onclick="go('baby')">宝宝信息</button>
    <button onclick="go('record')">辅食记录</button>
    <button class="active" onclick="go('main')">辅食图鉴</button>
    <button onclick="go('analysis')">喂养分析</button>
  </div>
</div>

<!-- 3.喂养分析（堆叠图 + 显示辅食名） -->
<div class="page" id="pageAnalysis">
  <div class="babyInfoBar">
    <img id="barAvatar3">
    <div class="info">
      <div class="name" id="barMonth3"></div>
      <div class="id" id="barId3"></div>
    </div>
  </div>
  <div class="title">📊喂养分析</div>
  
  <div class="chart-box">
    <h4>每日辅食记录（堆叠图）</h4>
    <canvas height="220" id="stackChart"></canvas>
  </div>

  <div class="chart-box">
    <h4>接受度统计</h4>
    <canvas height="180" id="chartAccept"></canvas>
  </div>

  <div class="avg-tip" id="sumInfo"></div>

  <button class="shareBtn" onclick="shareData()">📤分享给家人</button>

  <div class="nav">
    <button onclick="go('baby')">宝宝信息</button>
    <button onclick="go('record')">辅食记录</button>
    <button onclick="go('main')">辅食图鉴</button>
    <button class="active" onclick="go('analysis')">喂养分析</button>
  </div>
</div>

<!-- 编辑弹窗 -->
<div class="popup" id="editPopup">
  <div class="popup-box">
    <h3 style="margin-bottom:12px">编辑记录</h3>
    <input type="datetime-local" id="editTime" step="1"><br>
    <input type="text" id="editFood" placeholder="辅食名称"><br>
    <input type="number" id="editGram" placeholder="克数"><br>
    <div class="feedback" style="margin:10px 0">
      <button id="eGood">😊</button>
      <button id="eBad">😢</button>
    </div>
    <textarea id="editNote" placeholder="备注" style="width:100%;height:80px"></textarea>
    <div class="flexRow">
      <button class="btn grayBtn" onclick="closeEdit()">取消</button>
      <button class="btn" onclick="saveEdit()">确定</button>
    </div>
  </div>
</div>

<!-- 解锁弹窗 -->
<div class="popup" id="unlockPopup">
  <div class="popup-box" style="text-align:center">
    <h2>🎉解锁成功</h2>
    <p id="unlockText"></p>
    <button class="btn" onclick="closeUnlock()">确定</button>
  </div>
</div>

<script>
let records = JSON.parse(localStorage.getItem('records')) || [];
let baby = JSON.parse(localStorage.getItem('baby')) || {
  id:'', birth:'', avatar:'https://picsum.photos/200/200'
};
let collection = JSON.parse(localStorage.getItem('foodCollection')) || [];
let currentFeed = null;
let editIndex = -1;
let charts = {};

window.onload = () => {
  loadBaby();
  renderRecords();
  renderCollection();
  refreshAllChart();
  refreshInfoBar();
  autoJumpToRecord();

  // 头像上传修复
  document.getElementById('avatarInput').onchange = function(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      baby.avatar=ev.target.result;
      document.getElementById('avatarPreview').src=baby.avatar;
      localStorage.setItem('baby',JSON.stringify(baby));
      refreshInfoBar();
    };
    reader.readAsDataURL(file);
  };
};

// 自动进入记录页
function autoJumpToRecord(){
  if(baby.id && baby.birth){
    go('record');
  }
}

// 保存宝宝信息（修复）
function saveBaby(){
  const id=document.getElementById('babyId').value.trim();
  const birth=document.getElementById('babyBirth').value.trim();
  if(!id || !birth){
    alert('请填写宝宝ID和生日');
    return;
  }
  baby.id = id;
  baby.birth = birth;
  localStorage.setItem('baby', JSON.stringify(baby));
  loadBaby();
  refreshInfoBar();
  go('record');
}

// 计算月龄
function loadBaby(){
  if(!baby.birth){
    document.getElementById('age').value='';
    return;
  }
  document.getElementById('avatarPreview').src = baby.avatar;
  document.getElementById('babyId').value = baby.id;
  document.getElementById('babyBirth').value = baby.birth;

  const b=new Date(baby.birth);
  const now=new Date();
  let m=(now.getFullYear()-b.getFullYear())*12 + now.getMonth()-b.getMonth();
  let d=now.getDate()-b.getDate();
  if(d<0){
    m--;
    d+=new Date(b.getFullYear(),b.getMonth()+1,0).getDate();
  }
  const txt=`${m}月龄${d}天`;
  document.getElementById('babyMonth').innerText=txt;
  document.getElementById('age').value=txt;
}

// 顶部信息栏
function refreshInfoBar(){
  if(!baby) return;
  const avatar=baby.avatar || 'https://picsum.photos/200/200';
  const id=baby.id || '未设置';
  loadBaby();
  const month=document.getElementById('age').value || '未设置';
  for(let i=1;i<=3;i++){
    const img=document.getElementById('barAvatar'+i);
    const idEl=document.getElementById('barId'+i);
    const monthEl=document.getElementById('barMonth'+i);
    if(img) img.src=avatar;
    if(idEl) idEl.innerText='ID：'+id;
    if(monthEl) monthEl.innerText=month;
  }
}

// 导航
function go(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
  const page=document.getElementById('page'+p.charAt(0).toUpperCase()+p.slice(1));
  if(page) page.classList.add('active');
  if(event) event.target.classList.add('active');
  refreshInfoBar();
  if(p==='analysis') refreshAllChart();
}

// 表情
function setFeed(t){
  currentFeed=t;
  document.querySelectorAll('#pageRecord .feedback button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('badNote').style.display=t===0?'block':'none';
}

// 联想
function showSuggest(){
  const v=document.getElementById('food').value.toLowerCase();
  const box=document.getElementById('suggestBox');
  if(!v){box.style.display='none';return}
  const list=[...new Set(records.map(i=>i.food))].filter(x=>x.toLowerCase().includes(v));
  if(!list.length){box.style.display='none';return}
  box.innerHTML=list.map(x=>`<div onclick="pick('${x}')">${x}</div>`).join('');
  box.style.display='block';
}
function pick(v){
  document.getElementById('food').value=v;
  document.getElementById('suggestBox').style.display='none';
}

// 添加记录（新增克数）
function addRecord(){
  loadBaby();
  const age=document.getElementById('age').value;
  const time=document.getElementById('eatTime').value;
  const food=document.getElementById('food').value;
  const gram=document.getElementById('gram').value || '';
  const type=document.getElementById('type').value;
  const note=document.getElementById('badNote').value;
  if(!age || !time || !food || currentFeed==null){
    alert('请填写完整：月龄、时间、辅食、表情');
    return;
  }
  records.push({age,time,food,gram,type,feed:currentFeed,note});
  localStorage.setItem('records',JSON.stringify(records));
  checkUnlock();
  renderRecords();
  refreshAllChart();
  clearForm();
}
function clearForm(){
  document.getElementById('eatTime').value='';
  document.getElementById('food').value='';
  document.getElementById('gram').value='';
  document.getElementById('badNote').value='';
  document.getElementById('badNote').style.display='none';
  currentFeed=null;
  document.querySelectorAll('#pageRecord .feedback button').forEach(b=>b.classList.remove('active'));
}

// 渲染记录
function renderRecords(){
  document.getElementById('recordList').innerHTML=records.map((r,i)=>`
  <tr>
    <td>${r.age}</td>
    <td>${r.time.replace('T',' ')}</td>
    <td>${r.food}</td>
    <td>${r.gram || '-'}</td>
    <td>${r.feed==1?'😊':'😢'}</td>
    <td>${r.note||'-'}</td>
    <td><button onclick="edit(${i})">编辑</button></td>
  </tr>`).join('');
}

// 编辑
function edit(i){
  editIndex=i;
  const r=records[i];
  document.getElementById('editTime').value=r.time;
  document.getElementById('editFood').value=r.food;
  document.getElementById('editGram').value=r.gram || '';
  document.getElementById('editNote').value=r.note||'';
  document.querySelectorAll('#editPopup .feedback button').forEach(b=>b.classList.remove('active'));
  document.getElementById(r.feed==1?'eGood':'eBad').classList.add('active');
  document.getElementById('editPopup').style.display='flex';
}
function closeEdit(){document.getElementById('editPopup').style.display='none';editIndex=-1}
function saveEdit(){
  if(editIndex<0)return;
  const f=document.getElementById('editFood').value;
  const t=document.getElementById('editTime').value;
  const g=document.getElementById('editGram').value;
  const n=document.getElementById('editNote').value;
  const feed=document.getElementById('eGood').classList.contains('active')?1:0;
  if(!f || !t) return alert('不能为空');
  records[editIndex]={...records[editIndex],food:f,time:t,gram:g,feed:feed,note:n};
  localStorage.setItem('records',JSON.stringify(records));
  renderRecords();refreshAllChart();closeEdit();
}

// 解锁
function checkUnlock(){
  if(records.length<3)return;
  const last3=records.slice(-3);
  const ok=last3.every(x=>x.feed==1);
  if(!ok)return;
  const name=last3[2].food;
  if(collection.some(x=>x.name==name))return;
  collection.push({name});
  localStorage.setItem('foodCollection',JSON.stringify(collection));
  document.getElementById('unlockText').innerText=`连续3天笑脸，解锁：${name}`;
  document.getElementById('unlockPopup').style.display='flex';
  renderCollection();
}
function renderCollection(){
  const g=document.getElementById('foodGrid');
  if(!collection.length){g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999">暂无解锁</div>';return}
  g.innerHTML=collection.map(i=>`<div class="food"><h3>${i.name}</h3><span>已解锁</span></div>`).join('');
}

//========== 统计图表（堆叠柱状图 + 显示辅食名） ==========
function refreshAllChart(){
  drawStackChart();
  analysisAccept();
  analysisSummary();
}

// 堆叠图 + 显示辅食名称
function drawStackChart(){
  const dayMap={};
  records.forEach(r=>{
    const day=r.time.split('T')[0];
    if(!dayMap[day])dayMap[day]=[];
    dayMap[day].push(r);
  });
  const days=Object.keys(dayMap).sort().slice(-6);
  const foodList=[...new Set(records.map(x=>x.food))];
  const datasets=foodList.map((name,idx)=>{
    const data=days.map(day=>{
      const items=dayMap[day]||[];
      return items.filter(x=>x.food===name).length;
    });
    const colors=['#ff69b4','#74b9ff','#fd79a8','#fdcb6e','#00b894','#a29bfe'];
    return {
      label:name,
      data:data,
      backgroundColor:colors[idx%colors.length]
    };
  });
  if(charts.stack)charts.stack.destroy();
  const ctx=document.getElementById('stackChart').getContext('2d');
  charts.stack=new Chart(ctx,{
    type:'bar',
    data:{labels:days.map(d=>d.slice(5)),datasets},
    options:{
      responsive:true,
      plugins:{legend:{position:'bottom'}},
      scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}}
    }
  });
}

// 接受度
function analysisAccept(){
  const good=records.filter(x=>x.feed==1).length;
  const bad=records.length-good;
  if(charts.accept)charts.accept.destroy();
  const ctx=document.getElementById('chartAccept').getContext('2d');
  charts.accept=new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:['喜欢😊','不适应😢'],
      datasets:[{data:[good,bad],backgroundColor:['#ff69b4','#999']}]
    }
  });
}

// 摘要
function analysisSummary(){
  const total=records.length;
  const good=records.filter(x=>x.feed==1).length;
  const bad=total-good;
  const foods=[...new Set(records.map(x=>x.food))].length;
  document.getElementById('sumInfo').innerText=`总记录：${total}次｜喜欢：${good}次｜不适应：${bad}次｜已尝试：${foods}种`;
}

// 分享
function shareData(){
  const data={baby,records,collection};
  const encoded=encodeURIComponent(JSON.stringify(data));
  const url=window.location.origin+window.location.pathname+'#data='+encoded;
  if(navigator.share){
    navigator.share({title:baby.id+'辅食记录',text:'宝宝辅食喂养记录',url:url})
  }else{
    prompt('复制链接发给家人：',url);
  }
}

// 接收分享
window.onhashchange=()=>{
  try{
    const h=window.location.hash;
    if(!h.includes('data='))return;
    const j=decodeURIComponent(h.replace('#data=',''));
    const d=JSON.parse(j);
    if(d.baby){baby=d.baby;localStorage.setItem('baby',JSON.stringify(baby));}
    if(d.records){records=d.records;localStorage.setItem('records',JSON.stringify(records));}
    if(d.collection){collection=d.collection;localStorage.setItem('foodCollection',JSON.stringify(collection));}
    alert('同步成功！');
    window.location.hash='';
    window.location.reload();
  }catch(e){alert('同步失败')}
}

function closeUnlock(){document.getElementById('unlockPopup').style.display='none'}
</script>
</body>
</html>
