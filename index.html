<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>宝宝辅食记录</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow-x:hidden;background:#fff5f7}
.page{display:none;padding:16px;width:100%;max-width:480px;margin:0 auto;min-height:100vh}
.page.active{display:block}
.title{font-size:22px;font-weight:bold;text-align:center;margin:16px 0;color:#ff69b4}
.btn{background:#ff69b4;color:white;border:none;border-radius:14px;padding:14px;width:100%;margin-top:10px;font-weight:bold;font-size:16px}
.grayBtn{background:#ccc;color:white}
.nav{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:20px;position:sticky;bottom:0;background:#fff5f7;padding:8px 0}
.nav button{background:white;border:1px solid #ff69b4;color:#ff69b4;border-radius:12px;padding:10px 4px;font-size:12px}
.nav button.active{background:#ff69b4;color:white}
.form{background:white;border-radius:16px;padding:18px;margin-top:16px}
.form input,.form select,.form textarea{width:100%;padding:14px;margin-bottom:12px;border:1px solid #eee;border-radius:12px;font-size:16px}
.feedback{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.feedback button{padding:12px;border-radius:12px;border:1px solid #eee;background:white;font-size:20px}
.feedback button.active{background:#ff69b4;color:white}
#badNote{display:none;margin-bottom:12px}
.suggest{background:white;border:1px solid #eee;border-radius:12px;overflow:hidden;margin-top:-12px;margin-bottom:12px;max-height:150px;overflow-y:auto}
.suggest div{padding:12px 14px;cursor:pointer}
.suggest div:hover{background:#fef5f8}
.record-table{width:100%;background:white;border-radius:16px;overflow:hidden;margin-top:16px}
.record-table table{width:100%;border-collapse:collapse}
.record-table th,.record-table td{padding:10px 6px;text-align:left;border-bottom:1px solid #f0f0f0;font-size:13px;word-wrap:break-word}
.record-table th{background:#fff5f7;color:#ff69b4}
.record-table td button{padding:4px 6px;font-size:12px;background:#ff69b4;color:white;border:none;border-radius:6px;margin-right:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:16px}
.food{background:white;border-radius:16px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.food h3{margin:8px 0;font-size:15px}
.food span{font-size:12px}
.chart-container{background:white;border-radius:16px;padding:16px;margin-top:16px}
.stat-table{background:white;border-radius:16px;padding:14px;margin-top:16px;overflow-x:auto}
.stat-row{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;min-width:320px;text-align:center}
.stat-cell{font-size:13px}
.stat-label{font-size:12px;color:#999}
.avg-tip{text-align:center;color:#ff69b4;font-weight:bold;margin:8px 0}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:999}
.popup-box{background:white;padding:24px;border-radius:20px;width:90%;max-width:320px}
.flexRow{display:flex;gap:10px;margin-top:12px}
.flexRow button{flex:1}
</style>
</head>
<body>

<!-- 0. 宝宝信息页（默认首页）-->
<div class="page active" id="pageBaby">
  <div class="title">👶 宝宝信息</div>
  <div class="form">
    <input type="text" id="babyId" placeholder="请输入宝宝ID（家人同步用）">
    <input type="date" id="babyBirth">
    <div style="color:#ff69b4;margin:10px 0" id="babyMonth"></div>
    <button class="btn" onclick="saveBaby()">进入辅食记录</button>
  </div>
  <div class="nav">
    <button class="active" onclick="go('baby')">宝宝信息</button>
    <button onclick="go('record')">辅食记录</button>
    <button onclick="go('main')">辅食图鉴</button>
    <button onclick="go('analysis')">喂养分析</button>
  </div>
</div>

<!-- 1. 记录页 -->
<div class="page" id="pageRecord">
  <div class="title">📋 辅食记录</div>
  <div class="form">
    <input type="text" id="age" readonly placeholder="自动获取宝宝月龄">
    <input type="datetime-local" id="eatTime" step="1">
    <input type="text" id="food" placeholder="输入辅食名称" oninput="showSuggest()">
    <div class="suggest" id="suggestBox" style="display:none"></div>
    <select id="type">
      <option>主食类</option><option>蔬菜类</option><option>水果类</option><option>肉类</option><option>蛋类</option>
    </select>
    <div class="feedback">
      <button onclick="setFeed(1)">😊</button>
      <button onclick="setFeed(0)">😢</button>
    </div>
    <textarea id="badNote" placeholder="备注：过敏、起疹、大便异常（可选）"></textarea>
    <button class="btn" onclick="addRecord()">添加记录</button>
  </div>
  <div class="record-table">
    <table>
      <thead>
        <tr><th>月龄</th><th>时间</th><th>辅食</th><th>反应</th><th>备注</th><th>操作</th></tr>
      </thead>
      <tbody id="recordList"></tbody>
    </table>
  </div>
  <div class="nav">
    <button onclick="go('baby')">宝宝信息</button>
    <button class="active" onclick="go('record')">辅食记录</button>
    <button onclick="go('main')">辅食图鉴</button>
    <button onclick="go('analysis')">喂养分析</button>
  </div>
</div>

<!-- 2. 辅食图鉴 -->
<div class="page" id="pageMain">
  <div class="title">🍼 辅食图鉴</div>
  <div class="grid" id="foodGrid"></div>
  <div class="nav">
    <button onclick="go('baby')">宝宝信息</button>
    <button onclick="go('record')">辅食记录</button>
    <button class="active" onclick="go('main')">辅食图鉴</button>
    <button onclick="go('analysis')">喂养分析</button>
  </div>
</div>

<!-- 3. 喂养分析 -->
<div class="page" id="pageAnalysis">
  <div class="title">📊 喂养分析</div>
  <div class="stat-table">
    <div class="stat-row">
      <div class="stat-cell"><div class="stat-label">日1</div><div id="d1-count">0</div></div>
      <div class="stat-cell"><div class="stat-label">日2</div><div id="d2-count">0</div></div>
      <div class="stat-cell"><div class="stat-label">日3</div><div id="d3-count">0</div></div>
      <div class="stat-cell"><div class="stat-label">日4</div><div id="d4-count">0</div></div>
      <div class="stat-cell"><div class="stat-label">日5</div><div id="d5-count">0</div></div>
      <div class="stat-cell"><div class="stat-label">今日</div><div id="d6-count">0</div></div>
    </div>
    <div class="stat-row">
      <div class="stat-cell"><div class="stat-label">😊</div><div id="d1-good">0</div></div>
      <div class="stat-cell"><div class="stat-label">😊</div><div id="d2-good">0</div></div>
      <div class="stat-cell"><div class="stat-label">😊</div><div id="d3-good">0</div></div>
      <div class="stat-cell"><div class="stat-label">😊</div><div id="d4-good">0</div></div>
      <div class="stat-cell"><div class="stat-label">😊</div><div id="d5-good">0</div></div>
      <div class="stat-cell"><div class="stat-label">😊</div><div id="d6-good">0</div></div>
    </div>
    <div class="stat-row">
      <div class="stat-cell"><div class="stat-label">😢</div><div id="d1-bad">0</div></div>
      <div class="stat-cell"><div class="stat-label">😢</div><div id="d2-bad">0</div></div>
      <div class="stat-cell"><div class="stat-label">😢</div><div id="d3-bad">0</div></div>
      <div class="stat-cell"><div class="stat-label">😢</div><div id="d4-bad">0</div></div>
      <div class="stat-cell"><div class="stat-label">😢</div><div id="d5-bad">0</div></div>
      <div class="stat-cell"><div class="stat-label">😢</div><div id="d6-bad">0</div></div>
    </div>
  </div>
  <div class="avg-tip" id="avgTip">近6天平均 0 次</div>
  <div class="chart-container"><canvas id="stackChart"></canvas></div>
  <div class="nav">
    <button onclick="go('baby')">宝宝信息</button>
    <button onclick="go('record')">辅食记录</button>
    <button onclick="go('main')">辅食图鉴</button>
    <button class="active" onclick="go('analysis')">喂养分析</button>
  </div>
</div>

<!-- 编辑弹窗 -->
<div class="popup" id="editPopup">
  <div class="popup-box">
    <h3 style="margin-bottom:12px">编辑记录</h3>
    <input type="datetime-local" id="editTime" step="1"><br>
    <input type="text" id="editFood" placeholder="辅食名称"><br>
    <div class="feedback" style="margin:10px 0">
      <button id="eGood">😊</button>
      <button id="eBad">😢</button>
    </div>
    <textarea id="editNote" placeholder="备注" style="width:100%;height:80px"></textarea>
    <div class="flexRow">
      <button class="btn grayBtn" onclick="closeEdit()">取消</button>
      <button class="btn" onclick="saveEdit()">确定</button>
    </div>
  </div>
</div>

<!-- 解锁弹窗 -->
<div class="popup" id="unlockPopup">
  <div class="popup-box" style="text-align:center">
    <h2>🎉 解锁成功</h2>
    <p id="unlockText"></p>
    <button class="btn" onclick="closeUnlock()">确定</button>
  </div>
</div>

<script>
let records = JSON.parse(localStorage.getItem('records')) || [];
let baby = JSON.parse(localStorage.getItem('baby')) || {id:'',birth:''};
let collection = JSON.parse(localStorage.getItem('foodCollection')) || [];
let currentFeed = null;
let editIndex = -1;
let chart = null;

window.onload=()=>{loadBaby();renderRecords();renderCollection();analysis();}

// 宝宝信息 + 精确月龄
function saveBaby(){
  const id=document.getElementById('babyId').value;
  const birth=document.getElementById('babyBirth').value;
  if(!id||!birth)return alert('请填写完整');
  baby={id,birth};localStorage.setItem('baby',JSON.stringify(baby));
  loadBaby();go('record');
}
function loadBaby(){
  if(!baby.birth){document.getElementById('age').value='';return}
  const b=new Date(baby.birth);
  const now=new Date();
  let m=(now.getFullYear()-b.getFullYear())*12 + (now.getMonth()-b.getMonth());
  let d=now.getDate()-b.getDate();
  if(d<0){m--;d+=new Date(b.getFullYear(),b.getMonth()+1,0).getDate()}
  const text=`${m}月龄${d}天`;
  document.getElementById('babyMonth').innerText=text;
  document.getElementById('age').value=text;
}

// 导航
function go(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
  document.getElementById('page'+p.charAt(0).toUpperCase()+p.slice(1)).classList.add('active');
  event.target.classList.add('active');
  if(p=='analysis')analysis();
}

// 表情
function setFeed(t){
  currentFeed=t;
  document.querySelectorAll('.feedback button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('badNote').style.display=t==0?'block':'none';
}

// 辅食联想
function showSuggest(){
  const v=document.getElementById('food').value.toLowerCase();
  const box=document.getElementById('suggestBox');
  if(!v){box.style.display='none';return}
  const list=[...new Set(records.map(i=>i.food))].filter(x=>x.toLowerCase().includes(v));
  if(!list.length){box.style.display='none';return}
  box.innerHTML=list.map(x=>`<div onclick="pick('${x}')">${x}</div>`).join('');
  box.style.display='block';
}
function pick(v){document.getElementById('food').value=v;document.getElementById('suggestBox').style.display='none'}

// 添加记录
function addRecord(){
  loadBaby();
  const age=document.getElementById('age').value;
  const time=document.getElementById('eatTime').value;
  const food=document.getElementById('food').value;
  const note=document.getElementById('badNote').value;
  if(!age||!time||!food||currentFeed==null)return alert('请填写完整');
  records.push({age,time,food,feed:currentFeed,note});
  save();
  checkUnlock();
  renderRecords();
  analysis();
  clearForm();
}
function clearForm(){
  document.getElementById('eatTime').value='';
  document.getElementById('food').value='';
  document.getElementById('badNote').value='';
  document.getElementById('badNote').style.display='none';
  currentFeed=null;
  document.querySelectorAll('.feedback button').forEach(b=>b.classList.remove('active'));
}

// 渲染记录
function renderRecords(){
  document.getElementById('recordList').innerHTML=records.map((r,i)=>`
  <tr>
    <td>${r.age}</td>
    <td>${r.time.replace('T',' ')}</td>
    <td>${r.food}</td>
    <td>${r.feed==1?'😊':'😢'}</td>
    <td>${r.note||'-'}</td>
    <td>
      <button onclick="edit(${i})">编辑</button>
    </td>
  </tr>`).join('');
}

// 编辑
function edit(i){
  editIndex=i;const r=records[i];
  document.getElementById('editTime').value=r.time;
  document.getElementById('editFood').value=r.food;
  document.getElementById('editNote').value=r.note||'';
  document.querySelectorAll('#editPopup .feedback button').forEach(b=>b.classList.remove('active'));
  document.getElementById(r.feed==1?'eGood':'eBad').classList.add('active');
  document.getElementById('editPopup').style.display='flex';
}
function closeEdit(){document.getElementById('editPopup').style.display='none';editIndex=-1}
function saveEdit(){
  if(editIndex==-1)return;
  const f=document.getElementById('editFood').value;
  const t=document.getElementById('editTime').value;
  const n=document.getElementById('editNote').value;
  const feed=document.getElementById('eGood').classList.contains('active')?1:0;
  if(!f||!t)return alert('不能为空');
  records[editIndex]={...records[editIndex],food:f,time:t,feed:feed,note:n};
  save();renderRecords();analysis();closeEdit();
}

// 连续3个笑脸解锁新辅食
function checkUnlock(){
  if(records.length<3)return;
  const last3=records.slice(-3);
  const ok=last3.every(x=>x.feed==1);
  if(!ok)return;
  const name=last3[2].food;
  if(collection.some(x=>x.name==name))return;
  collection.push({name});
  localStorage.setItem('foodCollection',JSON.stringify(collection));
  document.getElementById('unlockText').innerText=`连续3天笑脸，解锁：${name}`;
  document.getElementById('unlockPopup').style.display='flex';
  renderCollection();
}
function renderCollection(){
  const g=document.getElementById('foodGrid');
  if(!collection.length){g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999">暂无解锁</div>';return}
  g.innerHTML=collection.map(i=>`<div class="food"><h3>${i.name}</h3><span>已解锁</span></div>`).join('');
}

// 分析
function analysis(){
  const days=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d)}
  const data=days.map(day=>{
    const pre=day.toISOString().split('T')[0];
    const list=records.filter(r=>r.time.startsWith(pre));
    return {
      count:list.length,
      good:list.filter(x=>x.feed==1).length,
      bad:list.filter(x=>x.feed==0).length
    }
  });
  ['d1','d2','d3','d4','d5','d6'].forEach((id,i)=>{
    document.getElementById(`${id}-count`).innerText=data[i].count;
    document.getElementById(`${id}-good`).innerText=data[i].good;
    document.getElementById(`${id}-bad`).innerText=data[i].bad;
  });
  const total=data.reduce((s,x)=>s+x.count,0);
  document.getElementById('avgTip').innerText=`近6天平均：${(total/6).toFixed(1)}次`;
  const ctx=document.getElementById('stackChart').getContext('2d');
  if(chart)chart.destroy();
  chart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:['1','2','3','4','5','今'],
      datasets:[
        {label:'😊',data:data.map(x=>x.good),backgroundColor:'#ff69b4'},
        {label:'😢',data:data.map(x=>x.bad),backgroundColor:'#aaa'}
      ]
    },
    options:{scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}}}
  });
}

function save(){localStorage.setItem('records',JSON.stringify(records))}
function closeUnlock(){document.getElementById('unlockPopup').style.display='none'}
</script>
</body>
</html>
